<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHR birth 퍼즐 이벤트</title>
    
    <script src="https://cdn.jsdelivr.net/npm/headbreaker@1.2.2/dist/headbreaker.js"></script>
    
    <style>
        /* ---------------------------------------------------
           [디자인 수정 구역] 사이트의 외형을 꾸미는 곳입니다.
           --------------------------------------------------- */
        body {
            background-color: #f4f4f9; /* 배경색 (원하는 색상 코드로 변경 가능) */
            text-align: center;
            font-family: 'Malgun Gothic', sans-serif; /* 글꼴 */
            margin: 0;
            padding: 20px 0;
            touch-action: none; /* 스마트폰에서 화면 스크롤 튕김 방지 */
            overflow: hidden; 
        }

        /* 타이머 글씨 디자인 */
        #timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c; /* 빨간색 */
            margin-bottom: 10px;
        }

        /* 조작 버튼들 모음 구역 */
        .controls {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        /* 퍼즐이 그려지는 도화지 (캔버스) */
        #puzzle-board {
            width: 350px; 
            height: 350px; 
            margin: 0 auto;
            border: 3px dashed #bdc3c7; /* 퍼즐 판 테두리 (점선) */
            background-color: #ffffff; /* 퍼즐 판 배경 (흰색) */
            position: relative;
        }

        /* 클리어 시 나타나는 어두운 배경 막 */
        #popup-overlay {
            display: none; /* 평소엔 숨김 */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999; /* 화면 맨 앞으로 오게 함 */
            justify-content: center;
            align-items: center;
        }

        /* 클리어 팝업창(하얀 네모 상자) 디자인 */
        .popup-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }

        /* 팝업창 안의 확인 버튼 */
        .popup-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>✨ CHR birth 퍼즐 이벤트 ✨</h1>
    
    <div id="timer-display">시간: 00:00</div>

    <div class="controls">
        <div>
            <label>난이도: </label>
            <select id="difficulty-selector">
                <option value="16">16조각 (쉬움 - 모바일 추천)</option>
                <option value="36">36조각 (보통)</option>
                <option value="64">64조각 (어려움 - 태블릿/PC 추천)</option>
            </select>
        </div>
        <button id="start-btn" style="padding: 10px; font-weight: bold; cursor: pointer;">게임 시작!</button>
    </div>

    <div id="puzzle-board"></div>

    <div id="popup-overlay">
        <div class="popup-content">
            <h2>🎉 미션 클리어! 🎉</h2>
            <p>직소 퍼즐을 완벽하게 맞추셨습니다!</p>
            <p id="final-time-text" style="font-size: 20px; font-weight: bold; color: #2980b9;">기록: 00초</p>
            <p style="color:#7f8c8d; font-size:14px;">화면을 캡처하여 인증해 주세요.</p>
            <button class="popup-btn" onclick="closePopup()">확인</button>
        </div>
    </div>

    <script>
        /* ---------------------------------------------------
           [기능 구역] 퍼즐이 작동하는 핵심 코드입니다.
           --------------------------------------------------- */
        const boardId = 'puzzle-board';
        const startBtn = document.getElementById('start-btn');
        const timerDisplay = document.getElementById('timer-display');
        const popupOverlay = document.getElementById('popup-overlay');
        const finalTimeText = document.getElementById('final-time-text');
        
        let canvas = null; 
        let timerInterval = null;
        let totalSeconds = 0;
        let gameStarted = false;

        function updateTimer() {
            totalSeconds++;
            const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const seconds = (totalSeconds % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `시간: ${minutes}:${seconds}`;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            totalSeconds = 0;
            timerDisplay.innerText = "시간: 00:00";
        }

        function startGame() {
            // ★★★★★ [가장 중요한 부분: 이미지 경로] ★★★★★
            // 폴더 이름이 CHR birth 여도, index.html과 같은 곳에 있는 images 폴더를 찾으므로 경로는 그대로입니다.
            // 무조건 images 폴더 안의 파일 이름이 puzzle.jpg 여야 작동합니다!
            const imageUrl = 'images/puzzle.jpg'; 
            
            const difficulty = parseInt(document.getElementById('difficulty-selector').value);
            const gridCount = Math.sqrt(difficulty); 

            document.getElementById(boardId).innerHTML = '';
            
            const img = new Image();
            img.src = imageUrl;
            
            // 이미지가 성공적으로 불러와지면 실행
            img.onload = () => {
                canvas = new headbreaker.Canvas(boardId, {
                    width: 350, 
                    height: 350,
                    pieceSize: 350 / gridCount,
                    proximity: 20, 
                    borderFill: 10,
                    strokeWidth: 1.5,
                    lineStyle: '#000000',
                    image: img,
                    preventOffscreen: true 
                });

                canvas.autogenerate({
                    horizontalPiecesCount: gridCount,
                    verticalPiecesCount: gridCount
                });

                canvas.shuffle(0.7); // 퍼즐 섞기
                canvas.draw(); // 화면에 그리기

                gameStarted = true;
                resetTimer();
                timerInterval = setInterval(updateTimer, 1000);

                canvas.attachSolvedValidator();
                canvas.onValid(() => {
                    setTimeout(() => { 
                        clearInterval(timerInterval);
                        gameStarted = false;
                        finalTimeText.innerText = `소요 시간: ${Math.floor(totalSeconds / 60)}분 ${totalSeconds % 60}초`;
                        popupOverlay.style.display = 'flex'; // 팝업창 띄우기
                    }, 500);
                });
            };

            // 이미지를 못 찾았을 때 뜨는 에러 메시지
            img.onerror = () => {
                alert("앗! 이미지를 불러오지 못했습니다. \n1. 컴퓨터 바탕화면에서 파일을 그냥 더블클릭해서 열었거나\n2. 사진 이름이 puzzle.jpg 가 아닌 경우입니다!");
            };
        }

        function closePopup() {
            popupOverlay.style.display = 'none';
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
